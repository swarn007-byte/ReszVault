services:
  - type: web
    name: reszvault
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: FRONTEND_ORIGIN
        value: https://reszvault.vercel.app
      - key: BACKEND_PUBLIC_URL
        value: https://reszvault.vercel.app
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
